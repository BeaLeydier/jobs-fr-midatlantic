name: Scrape French Company Jobs

on:
  schedule:
    # Runs every Monday at 06:00 UTC (adjust cron expression as needed)
    # For daily: "0 6 * * *"
    # For weekly (Monday): "0 6 * * 1"
    - cron: "0 6 * * 1"

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push updated jobs.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --cached --quiet || git commit -m "chore: update job listings [skip ci]"
          git push
